version: '3.8'

# Stack de test locale: Frenchio (code local) + qBittorrent
# Frenchio sert les fichiers directement avec son proxy pièce-conscient (QBIT_PROXY_DIR)
# Usage: docker compose -f docker-compose.test.yml up -d --build

services:
  frenchio:
    build: .
    container_name: frenchio-test
    ports:
      - "7777:7777"
    environment:
      - PORT=7777
      - QBITTORRENT_ENABLE=true
      - QBIT_PROXY_DIR=/downloads
    volumes:
      - qbit-downloads:/downloads:ro
    restart: unless-stopped
    depends_on:
      - qbittorrent

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent-test
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - WEBUI_PORT=8080
    volumes:
      - qbit-downloads:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped

volumes:
  qbit-downloads:
